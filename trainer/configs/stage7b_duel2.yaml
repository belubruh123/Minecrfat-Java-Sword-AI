# Duel phase ii, take 2. Same slow opponent (400-700 ms) as stage7b_duel,
# warm-started from that run's best fighter, now on the FIXED arena:
#   * soft wall  -> the opponent can no longer be juggled off the platform,
#                   so a landed combo actually kills instead of ringing out
#                   (that ring-out capped stage7b_duel's success at ~0.5).
#   * neck aim   -> crosshair rides the upper body, not the feet, up close.
# Run from trainer/: python train.py configs/stage7b_duel2.yaml --run stage7b_duel2
stage: fighter2
seed: 76
total_steps: 250_000
downsample: 3
frame_stack: 4
aim_checkpoint: ../models/aim.pt
init_checkpoint: ../runs/stage7b_duel/best.pt

curriculum:
  horizontal_prob: 1.0
  max_elev: 0.0
  dist_min: 3.0
  dist_max: 10.0
  yaw_range: 90.0
  episode_ticks: 1200
  lock_ticks: 3
  opponent: human
  opp_reaction_min: 8   # 400 ms
  opp_reaction_max: 14  # 700 ms
  opp_fight_prob: 0.0
  allow_jump: 0
  mortal: 1

ppo:
  lr: 1.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  rollout_len: 128
  num_minibatches: 2
  update_epochs: 2
  clip_coef: 0.2
  ent_coef: 0.002
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 1.0
  torch_threads: 3
