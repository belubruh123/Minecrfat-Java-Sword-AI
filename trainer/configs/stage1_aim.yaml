# Stage 1: horizontal aim. Opponent spawns at eye height around the agent.
stage: aim
seed: 1
total_steps: 3_000_000
downsample: 3        # 426x240 -> 142x80 (max-pool; protocol stays 240p)
frame_stack: 4       # motion + prediction

curriculum:
  horizontal_prob: 1.0
  max_elev: 0.0
  dist_min: 3.0
  dist_max: 8.0
  yaw_range: 90.0    # mostly-in-front spawns first; widened in stage 2 work
  episode_ticks: 200
  lock_ticks: 3
  opponent: static

ppo:
  lr: 2.5e-4
  gamma: 0.99
  gae_lambda: 0.95
  rollout_len: 128
  num_minibatches: 2
  update_epochs: 2
  clip_coef: 0.2
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 1.0
  torch_threads: 3
