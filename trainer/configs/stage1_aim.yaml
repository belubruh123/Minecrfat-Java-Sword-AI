# Stage 1: horizontal aim. Opponent spawns around the agent at a jittered
# height (v_jitter) so the target isn't always on the same screen row. Pitch is
# locked, so the lock is graded on YAW alignment only — the policy learns to
# center the target horizontally at any height, not "spin until white appears".
stage: aim
seed: 1
total_steps: 3_000_000
downsample: 3        # 426x240 -> 142x80 (max-pool; protocol stays 240p)
frame_stack: 4       # motion + prediction

curriculum:
  horizontal_prob: 1.0
  max_elev: 0.0
  dist_min: 3.0
  dist_max: 8.0
  yaw_range: 90.0    # full horizontal sweep — this stage is all about yaw
  v_jitter: 1.5      # target height varies +-1.5 blocks (floor-clamped) so the
                     # blob lands on different screen rows; on-target is yaw-only
                     # so a level crosshair still locks. Stays in the vertical FOV
                     # at dist_min=3, so no yaw-unrecoverable off-screen loss.
  episode_ticks: 200
  lock_ticks: 3
  opponent: static
  lock_pitch: 1      # horizontal stage: pitch is LOCKED (yaw only). The vertical
                     # stage unlocks pitch and teaches both axes.

ppo:
  lr: 2.5e-4
  gamma: 0.99
  gae_lambda: 0.95
  rollout_len: 128
  num_minibatches: 2
  update_epochs: 2
  clip_coef: 0.2
  ent_coef: 0.005
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 1.0
  torch_threads: 3
