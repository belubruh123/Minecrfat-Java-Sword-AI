# Stage 7a v2: COMBO SCHOOL with the fighter2 head — the policy now owns
# the ATTACK button (72-way: move x strafe x jump x sprint x attack). The
# frozen stage-3 swing net was trained before knockback existed and spams
# swings at ranges it cannot reach (~1 whiff per hit); hit timing and range
# judgment are now learned WITH movement. Opponent: passive (human movement
# + real hitstun, approaches at full speed + sprint, never attacks), so the
# only reward source is the real combo loop: close in, hit at full charge,
# chase the launch, hit again the moment the cooldown refills. Trunk
# continues the converged school run (0.4 whiffs, 92% chains at 1M) as a
# fine-tune under the new rule: strafe costs ONLY while the crosshair is
# already on target — off-target A/D sidesteps are the free fine-adjust
# tool that re-centers without moving the mouse (flicks are >=5°).
# Run from trainer/: python train.py configs/stage7a_comboschool.yaml --run stage7a_school2
stage: fighter2
seed: 73
total_steps: 800_000
downsample: 3
frame_stack: 4
aim_checkpoint: ../models/aim.pt
init_checkpoint: ../runs/stage7a_school2_v1/latest.pt

curriculum:
  horizontal_prob: 1.0
  max_elev: 0.0
  dist_min: 3.0
  dist_max: 10.0
  yaw_range: 90.0
  episode_ticks: 400
  lock_ticks: 3         # unused by the fighter stages
  opponent: passive     # chases at full speed + sprint, never attacks
  allow_jump: 0

ppo:
  lr: 2.5e-4
  gamma: 0.99
  gae_lambda: 0.95
  rollout_len: 128
  num_minibatches: 2
  update_epochs: 2
  clip_coef: 0.2
  ent_coef: 0.002
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 1.0
  torch_threads: 3
