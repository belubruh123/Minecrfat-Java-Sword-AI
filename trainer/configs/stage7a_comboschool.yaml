# Stage 7a: COMBO SCHOOL. The user's order: "let it learn combo first" —
# so the opponent strafes but NEVER attacks, and jumping is disabled
# entirely. With no counter-pressure, the only rewards on the table are the
# combo loop itself: hit at full charge, chase the knockback (pursuit
# shaping pays for closing while the chain is live), hit again the moment
# the 12.5-tick cooldown refills (30-tick window), never let the window
# lapse (drop penalty). Warm starts from fighter.pt so aim/approach carry
# over; stage 7b then re-introduces the fighting opponent.
# Run from trainer/: python train.py configs/stage7a_comboschool.yaml --run stage7a_comboschool
stage: fighter
seed: 71
total_steps: 1_500_000
downsample: 3
frame_stack: 4
aim_checkpoint: ../models/aim.pt
swing_checkpoint: ../models/swing.pt
init_checkpoint: ../models/fighter.pt

curriculum:
  horizontal_prob: 1.0
  max_elev: 0.0
  dist_min: 3.0
  dist_max: 10.0
  yaw_range: 90.0
  episode_ticks: 400
  lock_ticks: 3         # unused by the fighter stage
  opponent: passive     # human movement + real hitstun, never attacks
  allow_jump: 0

ppo:
  lr: 2.5e-4
  gamma: 0.99
  gae_lambda: 0.95
  rollout_len: 128
  num_minibatches: 2
  update_epochs: 2
  clip_coef: 0.2
  ent_coef: 0.002
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 1.0
  torch_threads: 3
