# Smooth aim v4: HALF camera speed. MAX_TURN_PER_TICK dropped 15 -> 7.5
# (user: the single-tick snap was "SO WEIRD" — no hand teleports the view
# between frames). Flicks now sweep across consecutive ticks; with the 5°
# deadzone the usable band is [5, 7.5]°/tick. Short adaptation fine-tune
# of the v3 doctrine model (100% locks, 0 flips) to the slower camera.
# Run from trainer/: python train.py configs/aim_smooth_v4.yaml --run aim_smooth_v4
stage: aim
seed: 82
total_steps: 800_000
downsample: 3
frame_stack: 4
init_checkpoint: ../runs/aim_smooth/final.pt

curriculum:
  horizontal_prob: 0.75
  max_elev: 3.0
  dist_min: 3.0
  dist_max: 10.0
  yaw_range: 90.0
  episode_ticks: 400
  lock_ticks: 3
  opponent: passive     # moving target: walks at the agent, no attacks
  allow_jump: 0

ppo:
  lr: 1.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  rollout_len: 128
  num_minibatches: 2
  update_epochs: 2
  clip_coef: 0.2
  ent_coef: 0.002
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 1.0
  torch_threads: 3
