# Smooth-aim fine-tune ("aim abusing" fix). The original aim net trained
# only on stationary spawns, so it tracks by bang-bang: any offset triggers
# a full-rate correction, and a moving opponent makes it thrash — the
# camera shake seen in every replay. Two changes: (1) the opponent is now
# the passive walker (a MOVING target that approaches, gets close, keeps
# shifting), so tracking is what gets trained; (2) AIM_JITTER_COST bleeds
# reward for large corrections made while ALREADY on target — micro
# adjustments are near-free, thrashing eats half the on-target pay.
# Off-target flicks stay free, so lock speed shouldn't regress. 25% of
# episodes keep elevation (vertical rehearsal). Warm starts from the
# shipped aim.pt; fine-tune lr per reward-hacking lesson 2.
# Acceptance: lock success >= the old 92% AND mean |dyaw| while on target
# well below the old 14.6 deg/tick with direction flips far under 72%.
# Run from trainer/: python train.py configs/aim_smooth.yaml --run aim_smooth
stage: aim
seed: 81
total_steps: 1_500_000
downsample: 3
frame_stack: 4
init_checkpoint: ../models/aim.pt

curriculum:
  horizontal_prob: 0.75
  max_elev: 3.0
  dist_min: 3.0
  dist_max: 10.0
  yaw_range: 90.0
  episode_ticks: 400
  lock_ticks: 3
  opponent: passive     # moving target: walks at the agent, no attacks
  allow_jump: 0

ppo:
  lr: 1.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  rollout_len: 128
  num_minibatches: 2
  update_epochs: 2
  clip_coef: 0.2
  ent_coef: 0.002
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 1.0
  torch_threads: 3
