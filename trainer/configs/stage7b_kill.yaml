# Duel phase i: KILLING SCHOOL. Mortal fights vs the passive walker — no
# danger anywhere, so "engage and finish fast" gets anchored deep before
# any opponent can scare the policy into the kiting basin (two runs
# collapsed into permanent avoidance when full lethality came first).
# Kill +5, tick and standing-far costs bleed slow play.
# Run from trainer/: python train.py configs/stage7b_kill.yaml --run stage7b_kill
stage: fighter2
seed: 75
total_steps: 300_000
downsample: 3
frame_stack: 4
aim_checkpoint: ../models/aim.pt
init_checkpoint: ../runs/stage7a_school2/final.pt

curriculum:
  horizontal_prob: 1.0
  max_elev: 0.0
  dist_min: 3.0
  dist_max: 10.0
  yaw_range: 90.0
  episode_ticks: 1200
  lock_ticks: 3
  opponent: passive
  allow_jump: 0
  mortal: 1

ppo:
  lr: 1.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  rollout_len: 128
  num_minibatches: 2
  update_epochs: 2
  clip_coef: 0.2
  ent_coef: 0.002
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 1.0
  torch_threads: 3
