# Stage 7b: combos under fire. Warm starts from the 7a combo school
# (fighter2 head: the policy owns the attack button) and re-introduces the
# humanized opponent that actually swings back (20% perfect-bot rehearsal).
# The opponent chases at full speed + sprint. Combo economics carry over:
# 30-tick on-cooldown window, chain bonus 0.35/link, pursuit shaping while
# the chain is live, drop penalty 0.25/link for letting the window lapse,
# break penalty 0.2/link for being knocked out of a live combo, whiff 0.6,
# jumping disabled. The job: keep the school's chains alive against someone
# hitting back — protect the chain with spacing/strafe instead of trading.
# Run from trainer/: python train.py configs/stage7b_chain.yaml --run stage7b_chain
stage: fighter2
seed: 74
total_steps: 2_000_000
downsample: 3
frame_stack: 4
aim_checkpoint: ../models/aim.pt
init_checkpoint: ../runs/stage7a_school2/final.pt

curriculum:
  horizontal_prob: 1.0
  max_elev: 0.0
  dist_min: 3.0
  dist_max: 10.0
  yaw_range: 90.0
  episode_ticks: 1200   # timeout is only a draw; duels usually end far sooner
  lock_ticks: 3         # unused by the fighter stages
  opponent: human
  opp_reaction_min: 3   # 150 ms
  opp_reaction_max: 7   # 350 ms
  opp_fight_prob: 0.2
  allow_jump: 0
  mortal: 1             # real hearts: kill ends the episode (+5), dying -5

ppo:
  lr: 2.5e-4
  gamma: 0.99
  gae_lambda: 0.95
  rollout_len: 128
  num_minibatches: 2
  update_epochs: 2
  clip_coef: 0.2
  ent_coef: 0.002
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 1.0
  torch_threads: 3
