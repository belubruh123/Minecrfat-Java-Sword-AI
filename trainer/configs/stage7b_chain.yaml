# Stage 7b: combos under fire. Warm starts from the 7a combo school and
# re-introduces the humanized opponent (20% perfect-bot rehearsal). The
# combo economics from 7a stay: 30-tick on-cooldown window, chain bonus
# 0.35/link (outpays a crit), pursuit shaping while the chain is live,
# drop penalty for letting the window lapse, break penalty 0.2/link for
# being knocked out of a live combo, jumping disabled. The policy's job
# here: keep the 7a chains alive against someone hitting back — protect
# the chain with spacing/strafe instead of trading.
# Run from trainer/: python train.py configs/stage7b_chain.yaml --run stage7b_chain
stage: fighter
seed: 72
total_steps: 2_000_000
downsample: 3
frame_stack: 4
aim_checkpoint: ../models/aim.pt
swing_checkpoint: ../models/swing.pt
init_checkpoint: ../runs/stage7a_comboschool/final.pt

curriculum:
  horizontal_prob: 1.0
  max_elev: 0.0
  dist_min: 3.0
  dist_max: 10.0
  yaw_range: 90.0
  episode_ticks: 400
  lock_ticks: 3         # unused by the fighter stage
  opponent: human
  opp_reaction_min: 3   # 150 ms
  opp_reaction_max: 7   # 350 ms
  opp_fight_prob: 0.2
  allow_jump: 0

ppo:
  lr: 2.5e-4
  gamma: 0.99
  gae_lambda: 0.95
  rollout_len: 128
  num_minibatches: 2
  update_epochs: 2
  clip_coef: 0.2
  ent_coef: 0.002
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 1.0
  torch_threads: 3
