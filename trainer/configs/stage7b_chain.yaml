# Duel phase iii: FULL OPPONENT. Human reactions (150-350 ms) + 10%
# perfect-bot rehearsal, warm from phase ii. By now killing under fire is
# the anchored behavior; this phase sharpens it against the real thing.
# Run from trainer/: python train.py configs/stage7b_chain.yaml --run stage7b_chain
stage: fighter2
seed: 77
total_steps: 1_200_000
downsample: 3
frame_stack: 4
aim_checkpoint: ../models/aim.pt
# proven fighter: 13 combo hits / 80% acc / decisive kills on the fixed arena
init_checkpoint: ../runs/stage7b_duel/best.pt

curriculum:
  horizontal_prob: 1.0
  max_elev: 0.0
  dist_min: 3.0
  dist_max: 10.0
  yaw_range: 90.0
  episode_ticks: 1200   # timeout is only a draw; duels usually end far sooner
  lock_ticks: 3         # unused by the fighter stages
  opponent: human
  opp_reaction_min: 3   # 150 ms
  opp_reaction_max: 7   # 350 ms
  opp_fight_prob: 0.1
  allow_jump: 0
  mortal: 1             # real hearts: kill ends the episode (+5), dying -5

ppo:
  lr: 1.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  rollout_len: 128
  num_minibatches: 2
  update_epochs: 2
  clip_coef: 0.2
  # 0.004 entropy-drifted a warm-started policy on this HIGH-VARIANCE fast-
  # opponent task: healthy for 28k steps then entropy ran away 0.35->1.4 and
  # the policy dissolved. Fine-tuning a converged fighter needs the entropy
  # bonus turned WAY down; best-return checkpointing holds the peak.
  ent_coef: 0.0007
  vf_coef: 0.5
  max_grad_norm: 0.5
  reward_scale: 1.0
  torch_threads: 3
